version: 2

models:
  - name: stg_ev_sessions
    description: "This model cleanses and stages the raw EV sessions data."
    columns:
      - name: SESSION_ID
        description: "The unique identifier for the EV session."
        tests:
          - not_null:
              config:
                severity: error
                error_if: ">149"
                warn_if: ">0"
          - unique:
              config:
                severity: error
                error_if: ">149"
                warn_if: ">0"
      - name: CHARGER_ID
        description: "The unique identifier for the charger."
        tests:
          - not_null:
              config:
                severity: error
          - relationships:
              arguments:
                to: ref('dim_chargers')
                field: CHARGER_ID
              config:
                severity: error
                error_if: ">778"
                warn_if: ">0"
      - name: SESSION_DATE
        description: "The date and time when the session started."
        tests:
          - not_null:
              config:
                severity: error
      - name: CHARGER_STATUS
        description: "The status of the charger during the session." 
        tests:
          - accepted_values:
              arguments:
                values: ['completed', 'failed', 'interrupted']
              config:
                severity: error
                error_if: ">1"
                warn_if: ">0"
version: 2

models:
  - name: int_daily_metrics
    description: "This model aggregates daily metrics for observability."
    columns:
      - name: METRIC_DATE
        description: "The date for which the metrics are calculated."
      - name: CHARGER_ID
        description: "The unique identifier for the charger."
      - name: TOTAL_KWH_DELIVERED
        description: "Total kilowatt-hours delivered by the charger on that date. This metric is calculated by summing the energy delivered across all sessions for that charger on that date."
      - name: TOTAL_SESSIONS
        description: "Total number of sessions for the charger on that date."
      - name: TOTAL_REVENUE
        description: "Total revenue generated by the charger on that date."

  - name: int_variance_metrics
    description: "This model computes day-over-day variance metrics per charger using LAG on the previous day's metrics for observability."
    columns:
      - name: METRIC_DATE
        description: "The date for which the variance metrics are calculated."
      - name: CHARGER_ID
        description: "The unique identifier for the charger."
      - name: TOTAL_KWH_DELIVERED
        description: "Total kilowatt-hours delivered by the charger on that date. This metric is calculated by summing the energy delivered across all sessions for that charger on that date."
      - name: PREV_TOTAL_KWH_DELIVERED
        description: "Total kilowatt-hours delivered by the charger on the previous date."
      - name: VARIANCE_KWH_DELIVERED
        description: "Variance in kilowatt-hours delivered by the charger on that date compared to the previous day."
      - name: KWH_DELIVERED_STATUS
        description: "A flag indicating whether the charger is new or not. If the previous day's data is null, them the charger is new.  If the previous day's data is 0, then the charger need to be checked."
      - name: TOTAL_SESSIONS
        description: "Total number of sessions for the charger on that date."
      - name: PREV_TOTAL_SESSIONS
        description: "Total number of sessions for the charger on the previous date."
      - name: VARIANCE_SESSIONS
        description: "Variance in the number of sessions for the charger on that date compared to the previous day."
      - name: SESSIONS_STATUS
        description: "A flag indicating whether the charger is new or not. If the previous day's data is null, them the charger is new.  If the previous day's data is 0, then the charger need to be checked."
      - name: TOTAL_REVENUE
        description: "Total revenue generated by the charger on that date."
      - name: PREV_TOTAL_REVENUE
        description: "Total revenue generated by the charger on the previous date."
      - name: VARIANCE_REVENUE
        description: "Variance in revenue generated by the charger on that date compared to the previous day."
      - name: REVENUE_STATUS
        description: "A flag indicating whether the charger is new or not. If the previous day's data is null, them the charger is new.  If the previous day's data is 0, then the charger need to be checked."